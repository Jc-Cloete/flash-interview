services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_password123}"
      MSSQL_PID: "Express"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/FlashInterview.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=FlashInterview;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;"
      Database__ApplyMigrationsOnStartup: "${DATABASE_APPLY_MIGRATIONS_ON_STARTUP:-false}"
      Database__SeedOnStartup: "${DATABASE_SEED_ON_STARTUP:-false}"
      Database__SeedFile: "docs/sql_sensitive_list.txt"
      Security__AdminApiKey: "${FLASHINTERVIEW_ADMIN_API_KEY:?Set FLASHINTERVIEW_ADMIN_API_KEY}"
      Security__MaskRateLimit__PermitLimit: "${MASK_RATE_LIMIT_PERMIT_LIMIT:-60}"
      Security__MaskRateLimit__WindowSeconds: "${MASK_RATE_LIMIT_WINDOW_SECONDS:-60}"
    depends_on:
      mssql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/FlashInterview.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      SensitiveWordsApi__BaseUrl: "http://api:8080/"
      SensitiveWordsApi__AdminApiKey: "${FLASHINTERVIEW_ADMIN_API_KEY:?Set FLASHINTERVIEW_ADMIN_API_KEY}"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  mssql-data:
