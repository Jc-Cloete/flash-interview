name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:
  dotnet:
    name: .NET restore, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Test release tag validator
        run: python3 -m unittest discover -s .github/scripts -p "*_tests.py"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FlashInterview.slnx

      - name: Build
        run: dotnet build FlashInterview.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test FlashInterview.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results
          path: TestResults
          if-no-files-found: ignore
          retention-days: 14

  docker-build:
    name: Docker build check (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: src/FlashInterview.Api/Dockerfile
          - service: web
            dockerfile: src/FlashInterview.Web/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without publishing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
